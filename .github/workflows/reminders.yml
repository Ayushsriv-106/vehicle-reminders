name: Vehicle Reminders

on:
  schedule:
    # 08:30 IST daily = 03:00 UTC
    - cron: "0 3 * * *"
  # Rebuild dashboard on every push to main
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/**"
      - ".github/workflows/**"
  # Allow manual runs from the Actions tab (handy for testing)
  workflow_dispatch:
    inputs:
      skip_email:
        description: "Skip sending email (dashboard only)"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build dashboard
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python scripts/build_dashboard.py

      - name: Send reminder email
        if: ${{ github.event.inputs.skip_email != 'true' }}
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python scripts/send_reminders.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: reminders
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
