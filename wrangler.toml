# Cloudflare Pages config for the gated dashboard + document locker.
# Used if you deploy with `wrangler pages deploy`; if you connect the repo via
# the Cloudflare dashboard (recommended, see cloudflare/README.md) set the same
# build output, KV binding and variables there instead.

name = "garage-fleet"
pages_build_output_dir = "docs"
compatibility_date = "2024-11-01"

# KV namespace that stores uploaded document scans. Create it once
#   (Workers & Pages → KV → Create namespace), then paste its id here
#   OR bind it in the Pages project settings as variable name DOCS.
[[kv_namespaces]]
binding = "DOCS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Runtime variables are set in the Pages project (Settings → Variables), not here,
# so secrets stay out of git:
#   AUTH_USER, AUTH_PASS  - the shared login (mark as secret)
#   DOC_API_URL           - set to  /api/files   (build-time, so the page calls the API)
#   SHEET_CSV_URL         - your published sheet CSV (build-time)
