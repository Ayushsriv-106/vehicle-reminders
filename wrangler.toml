# Cloudflare Pages config — used by the GitHub Actions deploy
# (.github/workflows/reminders.yml runs `wrangler pages deploy docs`).
# Setup steps: cloudflare/README.md

name = "garage-fleet"
pages_build_output_dir = "docs"
compatibility_date = "2024-11-01"

# Document scans are stored in this KV namespace ("garage-docs"), bound as DOCS
# so functions/api/files.js can read/write them. This binding is applied to the
# Pages project on every `wrangler pages deploy`.
[[kv_namespaces]]
binding = "DOCS"
id = "f1d8fa7f5b3542bdaccc25fe7d183a6f"

# Runtime login is set as Pages *secrets* by the deploy workflow (AUTH_USER /
# AUTH_PASS), so they never live in this committed file.
# DOC_API_URL is baked into the page at build time (set in the workflow), not here.
